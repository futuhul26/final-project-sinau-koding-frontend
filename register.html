<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - E-Meeting</title>
    <link href="./src/output.css" rel="stylesheet" />
  </head>
  <body
    class="flex items-center min-h-screen bg-cover bg-center pl-50"
    style="background-image: url('../assets/meeting-room.jpg')"
  >
    <div
      class="bg-white bg-opacity-90 rounded-2xl shadow-lg w-full max-w-md p-10 backdrop-blur-sm"
    >
      <!-- Logo & Title -->
      <div class="flex items-center justify-center mb-6">
        <div
          class="flex items-center justify-center w-10 h-10 text-white bg-orange-500 rounded-full text-lg font-bold mr-2"
        >
          E
        </div>
        <h1 class="text-xl font-semibold text-orange-500">E-Meeting</h1>
      </div>

      <h2 class="text-2xl font-bold text-center mb-2">Welcome Back!</h2>
      <p class="text-sm text-center text-gray-600 mb-6">
        Create your account here!
      </p>

      <!-- Form -->
      <form>
        <div class="mb-4">
          <label for="username" class="block text-sm font-medium text-gray-700"
            >Username</label
          >
          <input
            type="text"
            id="username"
            placeholder="Username"
            class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
            required
          />
        </div>

        <div class="mb-4">
          <label for="Email" class="block text-sm font-medium text-gray-700"
            >Email</label
          >
          <input
            type="email"
            id="email"
            placeholder="Email"
            class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400"
            required
          />
        </div>

        <div class="mb-4">
          <label for="password" class="block text-sm font-medium text-gray-700"
            >Password</label
          >
          <div class="relative">
            <input
              type="password"
              id="password"
              placeholder="Password"
              class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg pr-10 focus:outline-none focus:ring-2 focus:ring-orange-400"
              required
            />
            <!-- Icon Mata -->
            <div
              class="absolute inset-y-0 right-3 flex items-center cursor-pointer"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 text-gray-400"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
            </div>
          </div>
        </div>

        <div class="mb-7">
          <label for="password" class="block text-sm font-medium text-gray-700"
            >Confirm Password</label
          >
          <div class="relative">
            <input
              type="password"
              id="password"
              placeholder="Confirm Password"
              class="w-full px-4 py-2 mt-1 border border-gray-300 rounded-lg pr-10 focus:outline-none focus:ring-2 focus:ring-orange-400"
              required
            />
            <!-- Icon Mata -->
            <div
              class="absolute inset-y-0 right-3 flex items-center cursor-pointer"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 text-gray-400"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
            </div>
          </div>
        </div>

        <button
          type="submit"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2 rounded-lg transition duration-200"
        >
          Create Account
        </button>
      </form>
      <p class="mt-1 text-center text-sm/6 text-gray-500">
        Already have an account?
        <a href="./login.html" class="font-semibold text-orange-500 hover:text-orange-600"
          >Login</a
        >
      </p>
    </div>
  </body>
</html>
